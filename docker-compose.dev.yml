services:
  postgres:
    image: postgres:16-alpine
    container_name: liqahi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liqahi
      POSTGRES_USER: liqahi
      POSTGRES_PASSWORD: liqahi
    ports:
      - "5433:5432"
    volumes:
      - liqahi-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liqahi -d liqahi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: liqahi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - liqahi-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  liqahi-pgdata:
  liqahi-redisdata:
